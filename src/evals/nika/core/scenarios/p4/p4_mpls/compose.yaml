      switch_1_to_switch_3:
        interface_name: eth2
    healthcheck:
      test:
      - CMD-SHELL
      - pgrep -f simple_switch_grpc
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
    - ./topology/switch_1:/tmp/config:ro
    command: |-
      bash -lc '
      for d in $(ls /sys/class/net | grep -v lo); do ip addr flush dev "$$d"; done;
      for d in $(ls /sys/class/net | grep -v lo); do ip route flush dev "$$d"; done;
      cp -r /tmp/config/* /;
      ip link set eth1 address 00:00:00:01:02:00
      ip link set eth2 address 00:00:00:01:03:00
      p4c mpls.p4 -o /
      simple_switch -i 1@eth0 -i 2@eth1 -i 3@eth2 --log-console mpls.json >> sw.log &
      while [[ $(pgrep simple_switch) -eq 0 ]]; do sleep 1; done
      until simple_switch_CLI <<< "help"; do sleep 1; done
      simple_switch_CLI <<< $(cat commands.txt)
      sleep infinity
      '
