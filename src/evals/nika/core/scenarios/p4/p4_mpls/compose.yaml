services:
  default:
    image: kathara/base
    x-local: true
    init: true
    hostname: default
    cap_add: &id002
    - NET_ADMIN
    - SYS_ADMIN
    command: sleep infinity
  host_1:
    image: kathara/base
    x-local: true
    init: true
    hostname: host_1
    cap_add: &id001
    - NET_ADMIN
    privileged: true
    networks:
      host_1_to_switch_1:
        interface_name: eth0
    command: |-
      bash -lc '
      for d in $(ls /sys/class/net | grep -v lo); do ip addr flush dev "$$d"; done;
      for d in $(ls /sys/class/net | grep -v lo); do ip route flush dev "$$d"; done;
      ip link set eth0 address 00:00:0a:01:01:02
      ip addr add 10.1.1.2/24 dev eth0
      ip r add 10.7.2.0/24 dev eth0
      ip r add 10.7.3.0/24 dev eth0
      arp -s 10.7.2.2 00:00:0a:07:02:02
