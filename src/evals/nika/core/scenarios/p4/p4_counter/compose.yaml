# Auto-generated from Kathara lab.conf
# Machines: pc1, pc2, pc3, s1, s2, s3, s4
# Networks: A, B, C, D, E, F, G
# Per-network x-interface-name = eth0, eth1, ... (from lab.conf machine[0], machine[1], ...)

services:
  default:
    image: kathara/base
    x-local: true
    init: true
    hostname: default
    cap_add: &id002
    - NET_ADMIN
    - SYS_ADMIN
    command: sleep infinity
  pc1:
    image: kathara/base
    x-local: true
    init: true
    hostname: pc1
    cap_add: &id001
    - NET_ADMIN
    privileged: true
    networks:
      A:
        interface_name: eth0
    command: |-
      bash -lc '
      for d in $(ls /sys/class/net | grep -v lo); do ip addr flush dev "$$d"; done;
      for d in $(ls /sys/class/net | grep -v lo); do ip route flush dev "$$d"; done;
      sysctl net.ipv4.conf.all.arp_ignore=8
      sysctl net.ipv4.conf.default.arp_ignore=8
      sysctl net.ipv4.conf.all.arp_announce=8
      sysctl net.ipv4.conf.default.arp_announce=8
      ip link set eth0 address 00:00:0a:00:00:01
      ip addr add 10.0.0.1/24 dev eth0
      arp -s 10.0.0.2 00:00:0a:00:00:02
      arp -s 10.0.0.3 00:00:0a:00:00:03
      sleep infinity
      '
  pc2:
    image: kathara/base
    x-local: true
    init: true
    hostname: pc2
    cap_add: *id001
    privileged: true
    networks:
      F:
        interface_name: eth0
    command: |-
      bash -lc '
      for d in $(ls /sys/class/net | grep -v lo); do ip addr flush dev "$$d"; done;
      for d in $(ls /sys/class/net | grep -v lo); do ip route flush dev "$$d"; done;
      sysctl net.ipv4.conf.all.arp_ignore=8
      sysctl net.ipv4.conf.default.arp_ignore=8
      sysctl net.ipv4.conf.all.arp_announce=8
      sysctl net.ipv4.conf.default.arp_announce=8
      ip link set eth0 address 00:00:0a:00:00:02
      ip addr add 10.0.0.2/24 dev eth0
      arp -s 10.0.0.1 00:00:0a:00:00:01
      arp -s 10.0.0.3 00:00:0a:00:00:03
      sleep infinity
      '
  pc3:
    image: kathara/base
    x-local: true
    init: true
    hostname: pc3
    cap_add: *id001
    privileged: true
    networks:
      G:
        interface_name: eth0
    command: |-
      bash -lc '
      for d in $(ls /sys/class/net | grep -v lo); do ip addr flush dev "$$d"; done;
      for d in $(ls /sys/class/net | grep -v lo); do ip route flush dev "$$d"; done;
      sysctl net.ipv4.conf.all.arp_ignore=8
      sysctl net.ipv4.conf.default.arp_ignore=8
      sysctl net.ipv4.conf.all.arp_announce=8
      sysctl net.ipv4.conf.default.arp_announce=8
      ip link set eth0 address 00:00:0a:00:00:03
      ip addr add 10.0.0.3/24 dev eth0
      arp -s 10.0.0.1 00:00:0a:00:00:01
      arp -s 10.0.0.2 00:00:0a:00:00:02
      sleep infinity
      '
  s1:
    image: kathara/p4
    x-local: true
    init: true
    hostname: s1
    cap_add: *id002
    privileged: true
    sysctls:
      net.ipv4.ip_forward: '1'
    networks:
      A:
        interface_name: eth0
      B:
        interface_name: eth1
      C:
        interface_name: eth2
    healthcheck:
      test:
      - CMD-SHELL
      - pgrep -f simple_switch_grpc
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
    - ./topology/s1:/tmp/config:ro
    command: |-
      bash -lc '
      for d in $(ls /sys/class/net | grep -v lo); do ip addr flush dev "$$d"; done;
      for d in $(ls /sys/class/net | grep -v lo); do ip route flush dev "$$d"; done;
      cp -r /tmp/config/* /;
      sysctl net.ipv4.conf.all.arp_ignore=8
      sysctl net.ipv4.conf.default.arp_ignore=8
      sysctl net.ipv4.conf.all.arp_announce=8
      sysctl net.ipv4.conf.default.arp_announce=8
      p4c l2_basic_forwarding_counter.p4
      simple_switch -i 1@eth0 -i 2@eth1 -i 3@eth2 --log-console l2_basic_forwarding_counter.json >> sw.log &
      while [[ $(pgrep simple_switch) -eq 0 ]]; do sleep 1; done
      until simple_switch_CLI <<< "help"; do sleep 1; done
      simple_switch_CLI <<< $(cat commands.txt)
      sleep infinity
      '
