# Scenario registry for build_images/scenarios
# Used to automate dataset.yaml generation. Each entry describes one runnable
# lab (one compose file) with its lab_name and paths relative to this directory.
#
# Path convention: paths are relative to build_images/scenarios (SCENARIOS_DIR).
# Sandbox format in dataset: [kathara, "<compose_path>"]

scenarios:
  # ---------------------------------------------------------------------------
  # data_center
  # ---------------------------------------------------------------------------

  - id: data_center/dc_clos_service/size_s
    category: data_center
    name: dc_clos_service
    size: s
    compose_path: data_center/dc_clos_service/size_s/compose.yaml
    lab_name: dc_clos_service
    lab_conf_path: data_center/dc_clos_service/size_s/topology/lab.conf
    has_lab_generator: true
    description: |
      You have access to a 3-tier CLOS data center network with services (small size):
      - 1 super-spine, 2 spine, 2 leaf routers
      - 1 DNS server (dns_pod0), 1 web server (webserver0_pod0), 1 external client (client_0)
      - BGP routing; traffic control (tc) may affect interface performance
      Each leaf router connects to spine routers and one service/host; spines connect to super-spine and leaves.
      DNS and web servers; BGP routing; tc may affect interface performance.
    device_naming: |
      ## Device Naming Convention
      - Super-spine: super_spine_router_0
      - Spine: spine_router_X_Y (X=pod, Y=router_id)
      - Leaf: leaf_router_X_Y (X=pod, Y=router_id)
      - DNS: dns_pod0 (pod 0)
      - Web: webserver0_pod0 (pod 0)
      - Clients: client_0

  - id: data_center/dc_clos_service/size_m
    category: data_center
    name: dc_clos_service
    size: m
    compose_path: data_center/dc_clos_service/size_m/compose.yaml
    lab_name: dc_clos_service
    lab_conf_path: data_center/dc_clos_service/size_m/topology/lab.conf
    has_lab_generator: true
    description: |
      You have access to a 3-tier CLOS data center network with services:
      - 2 super-spine, 8 spine, 8 leaf routers
      - 2 DNS servers (dns_pod0, dns_pod1), 8 web servers (webserverN_podX), 2 external clients (client_0, client_1)
      - BGP routing; traffic control (tc) may affect interface performance
      DNS zones: pod0.dc (web 10.0.x.10), pod1.dc (web 10.1.x.10). Each leaf connects to 4 spines (eth0-eth3) and one service; each spine to 2 super-spine (eth0-eth1) and 4 leaves (eth2-eth5).
    device_naming: |
      ## Device Naming Convention
      - Super-spine: super_spine_router_0, super_spine_router_1
      - Spine: spine_router_X_Y (X=pod, Y=router_id)
      - Leaf: leaf_router_X_Y (X=pod, Y=router_id)
      - DNS: dns_pod0, dns_pod1
      - Web: webserver0_pod0, webserver1_pod0, webserver2_pod0, webserver0_pod1, webserver1_pod1, webserver2_pod1
      - Clients: client_0, client_1

  - id: data_center/dc_clos_service/size_l
    category: data_center
    name: dc_clos_service
    size: l
    compose_path: data_center/dc_clos_service/size_l/compose.yaml
    lab_name: dc_clos_service
    lab_conf_path: data_center/dc_clos_service/size_l/topology/lab.conf
    has_lab_generator: true
    description: |
      You have access to a 3-tier CLOS data center network with services (large size):
      - 4 super-spine, 32 spine, 32 leaf routers
      - 2 DNS servers (dns_pod0, dns_pod1), 32 web servers (webserverN_podX), 2 external clients
      - BGP routing; traffic control (tc) may affect interface performance
      CLOS 3-tier; each leaf connects to spines and one service; each spine to super-spines and leaves. BGP; tc may affect performance.
    device_naming: |
      ## Device Naming Convention
      - Super-spine: super_spine_router_0, super_spine_router_1, ...
      - Spine: spine_router_X_Y (X=pod, Y=router_id)
      - Leaf: leaf_router_X_Y (X=pod, Y=router_id)
      - DNS: dns_pod0, dns_pod1
      - Web: webserverN_podX (N=leaf index in pod, X=pod)
      - Clients: client_0, client_1

  - id: data_center/dc_clos_worker/size_s
    category: data_center
    name: dc_clos_worker
    size: s
    compose_path: data_center/dc_clos_worker/size_s/compose.yaml
    lab_name: dc_clos_worker
    lab_conf_path: data_center/dc_clos_worker/size_s/topology/lab.conf
    has_lab_generator: true
    description: |
      You have access to a 3-tier CLOS data center network with BGP only (small):
      - 1 super-spine, 2 spine, 2 leaf routers, 2 hosts (pc_0_0, pc_0_1)
      - EBGP between all adjacent routers; each leaf connects to spines and one host.
      Each leaf connects to spine routers (eth0-eth3) and 1 host (eth4); each spine to super-spine (eth0-eth1) and leaf routers (eth2-eth5). All routers run FRR with BGP.
    device_naming: |
      ## Device Naming Convention
      - Super-spine: super_spine_router_0
      - Spine: spine_router_0_0, spine_router_0_1
      - Leaf: leaf_router_0_0, leaf_router_0_1
      - Hosts: pc_0_0, pc_0_1

  - id: data_center/dc_clos_worker/size_m
    category: data_center
    name: dc_clos_worker
    size: m
    compose_path: data_center/dc_clos_worker/size_m/compose.yaml
    lab_name: dc_clos_worker
    lab_conf_path: data_center/dc_clos_worker/size_m/topology/lab.conf
    has_lab_generator: true
    description: |
      You have access to a 3-tier CLOS data center network with 26 devices (BGP only):
      - 2 super-spine (super_spine_router_0, super_spine_router_1), 8 spine (spine_router_X_Y), 8 leaf (leaf_router_X_Y), 8 hosts (pc_X_Y)
      - Each leaf connects to 4 spines (eth0-eth3) and 1 host (eth4); each spine to 2 super-spine (eth0-eth1) and 4 leaves (eth2-eth5). All routers run FRR with BGP.
    device_naming: |
      ## Device Naming Convention
      - Super-spine: super_spine_router_0, super_spine_router_1
      - Spine: spine_router_X_Y (X=pod 0|1, Y=0..3)
      - Leaf: leaf_router_X_Y (X=pod 0|1, Y=0..3)
      - Hosts: pc_X_Y (e.g. pc_0_0, pc_0_1, pc_1_0, pc_1_3)

  - id: data_center/dc_clos_worker/size_l
    category: data_center
    name: dc_clos_worker
    size: l
    compose_path: data_center/dc_clos_worker/size_l/compose.yaml
    lab_name: dc_clos_worker
    lab_conf_path: data_center/dc_clos_worker/size_l/topology/lab.conf
    has_lab_generator: true
    description: |
      You have access to a 3-tier CLOS data center network with BGP only (large):
      - 4 super-spine, 32 spine, 32 leaf routers, 32 hosts (pc_X_Y)
      - EBGP between all adjacent routers; leaf routers advertise connected host networks. Same connectivity: leaf–spines (eth0-eth3), leaf–host (eth4); spine–super-spine (eth0-eth1), spine–leaves (eth2-eth5).
    device_naming: |
      ## Device Naming Convention
      - Super-spine: super_spine_router_0, super_spine_router_1, ...
      - Spine: spine_router_X_Y (X=pod, Y=router_id)
      - Leaf: leaf_router_X_Y (X=pod, Y=router_id)
      - Hosts: pc_X_Y (X=pod, Y=host_id, e.g. pc_0_0, pc_1_2)

