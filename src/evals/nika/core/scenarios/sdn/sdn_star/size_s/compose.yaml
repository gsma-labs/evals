# Auto-generated from Kathara lab.conf
# Machines: switch_0, switch_1, switch_2, switch_3, switch_4, host_1, host_2, host_3, host_4, controller
# Networks: host_1_switch_1, host_2_switch_2, host_3_switch_3, host_4_switch_4, switch_0_switch_1, switch_0_switch_2, switch_0_switch_3, switch_0_switch_4, switch_controller
# Per-network x-interface-name = eth0, eth1, ... (from lab.conf machine[0], machine[1], ...)

services:
  default:
    image: kathara/base
    x-local: true
    init: true
    hostname: default
    cap_add: &id001
    - NET_ADMIN
    - SYS_ADMIN
    command: sleep infinity
  switch_0:
    image: kathara/sdn
    x-local: true
    init: true
    hostname: switch_0
    cap_add: *id001
    privileged: true
    sysctls:
      net.ipv4.ip_forward: '1'
    networks:
      switch_0_switch_1:
        interface_name: eth0
      switch_0_switch_2:
        interface_name: eth1
      switch_0_switch_3:
        interface_name: eth2
      switch_0_switch_4:
        interface_name: eth3
      switch_controller:
        interface_name: eth4
    healthcheck:
      test:
      - CMD-SHELL
      - pgrep -f openvswitch-switch
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    command: |-
      bash -lc '
      for d in $(ls /sys/class/net | grep -v lo); do ip addr flush dev "$$d"; done;
      for d in $(ls /sys/class/net | grep -v lo); do ip route flush dev "$$d"; done;
      /usr/share/openvswitch/scripts/ovs-ctl --system-id=random start
      ovs-vsctl add-br switch_0
      ovs-vsctl set-fail-mode switch_0 secure
      ip link set eth0 up
      ovs-vsctl add-port switch_0 eth0
      ip link set eth1 up
      ovs-vsctl add-port switch_0 eth1
      ip link set eth2 up
      ovs-vsctl add-port switch_0 eth2
      ip link set eth3 up
      ovs-vsctl add-port switch_0 eth3
      ip addr add 20.0.0.1/24 dev eth4
      ovs-vsctl set-controller switch_0 tcp:20.0.0.100:6633
      sleep infinity
      '
