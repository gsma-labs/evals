# Auto-generated from Kathara lab.conf
# Machines: spine_1, leaf_1, leaf_2, host_1_1, host_1_2, host_2_1, host_2_2, controller
# Networks: host_1_1_leaf_1, host_1_2_leaf_1, host_2_1_leaf_2, host_2_2_leaf_2, spine_1_leaf_1, spine_1_leaf_2, switch_controller
# Per-network x-interface-name = eth0, eth1, ... (from lab.conf machine[0], machine[1], ...)

services:
  default:
    image: kathara/base
    x-local: true
    init: true
    hostname: default
    cap_add: &id001
    - NET_ADMIN
    - SYS_ADMIN
    command: sleep infinity
  spine_1:
    image: kathara/sdn
    x-local: true
    init: true
    hostname: spine_1
    cap_add: *id001
    privileged: true
    sysctls:
      net.ipv4.ip_forward: '1'
    networks:
      spine_1_leaf_1:
        interface_name: eth0
      spine_1_leaf_2:
        interface_name: eth1
      switch_controller:
        interface_name: eth2
    healthcheck:
      test:
      - CMD-SHELL
      - pgrep -f openvswitch-switch
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    command: |-
      bash -lc '
      for d in $(ls /sys/class/net | grep -v lo); do ip addr flush dev "$$d"; done;
      for d in $(ls /sys/class/net | grep -v lo); do ip route flush dev "$$d"; done;
      /usr/share/openvswitch/scripts/ovs-ctl --system-id=random start
      ovs-vsctl add-br spine_1
      ovs-vsctl set-fail-mode spine_1 secure
      ovs-vsctl set bridge spine_1 stp_enable=true
      ovs-vsctl add-port spine_1 eth0
      ovs-vsctl add-port spine_1 eth1
      ip addr add 20.0.0.1/24 dev eth2
      ip link set eth2 up
      ovs-vsctl set-controller spine_1 tcp:20.0.0.100:6633
      ovs-vsctl set bridge spine_1 stp_enable=true
      sleep infinity
      '
  leaf_1:
    image: kathara/sdn
    x-local: true
    init: true
    hostname: leaf_1
    cap_add: *id001
    privileged: true
    sysctls:
