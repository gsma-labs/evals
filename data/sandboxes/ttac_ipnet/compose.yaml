services:
  default:
    image: python:3.13-slim
    init: true
    command: tail -f /dev/null
    depends_on:
      server:
        condition: service_healthy
    networks: [ttac]

  server:
    build: .
    init: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 90s
    networks: [ttac]

networks:
  ttac:
    internal: true
