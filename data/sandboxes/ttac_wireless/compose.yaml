services:
  default:
    image: curlimages/curl:latest
    init: true
    entrypoint: [""]
    command: tail -f /dev/null
    user: root
    depends_on:
      server:
        condition: service_healthy
    networks: [ttac]

  server:
    build: .
    init: true
    environment:
      - DATA_SOURCE=data/Track A/data/Phase_1
      - DATA_SPLIT=train
    volumes:
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks: [ttac]

networks:
  ttac:
    internal: true
