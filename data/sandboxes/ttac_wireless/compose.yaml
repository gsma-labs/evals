services:
  default:
    image: curlimages/curl:latest
    init: true
    entrypoint: [""]
    command: tail -f /dev/null
    user: root
    read_only: true
    tmpfs:
      - /tmp:size=32m
    mem_limit: ${SAMPLE_METADATA_CLIENT_MEM-64m}
    cpus: ${SAMPLE_METADATA_CLIENT_CPUS-0.25}
    pids_limit: 64
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    depends_on:
      server:
        condition: service_healthy
    networks: [ttac]

  server:
    build: .
    init: true
    environment:
      - DATA_SOURCE=data/Track A/data/Phase_1
      - DATA_SPLIT=train
    volumes:
      - ./data:/app/data:ro
    mem_limit: ${SAMPLE_METADATA_SERVER_MEM-256m}
    cpus: ${SAMPLE_METADATA_SERVER_CPUS-0.5}
    pids_limit: 128
    shm_size: 64m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks: [ttac]

networks:
  ttac:
    internal: true
