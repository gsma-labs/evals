  - id: multiple_faults_compound
    task_family: multiple_faults
    selectable: false
    description: "Multiple independent failures occur at the same time, creating overlapping symptoms."
    symptom: |
      Users report broad and inconsistent network issues: some services time out,
      some routes fail, and symptoms seem to point to more than one device or cause.
      A single root cause is unlikely.
